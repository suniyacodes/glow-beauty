<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Glow Beauty Store</title>
</head>
<body>
    <div class="login-container">

    <form id="loginForm">

        <fieldset>

            <legend>Login</legend>

            <h2>Welcome Back</h2>
            <p class="subtitle">Login to continue shopping</p>

            <label>Email</label>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="Enter your email"
                   required>

            <label>Password</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Enter your password"
                   required>

            <div class="options">

                <label class="remember">
                    <input type="checkbox">
                    Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" id="loginBtn">Login</button>

            <p class="register">
                Don't have an account?
                <a href="register.html">Register</a>
            </p>

        </fieldset>

    </form>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e8,#fff5f8);

}

.login-container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

fieldset{
    width:420px;
    padding:35px;
    border:3px solid #ff5c8a;
    border-radius:15px;
    background:#ffffff;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

legend{
    padding:8px 18px;
    background:#ff5c8a;
    color:white;
    border-radius:20px;
    font-size:20px;
    font-weight:bold;
}

h2{

    text-align:center;
    color:#ff2f70;
    margin-bottom:5px;

}

.subtitle{

    text-align:center;
    color:gray;
    margin-bottom:25px;

}

label{

    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;

}

input[type=email],
input[type=password]{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus{
    border-color:#ff5c8a;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:18px 0;
    font-size:14px;
}

.options a{
    color:#ff2f70;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#ff5c8a;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#e63e70;
}

.register{
    margin-top:18px;
    text-align:center;
}

.register a{
    color:#ff2f70;
    text-decoration:none;
    font-weight:bold;
}
.register a:hover{
    text-decoration:underline;
}
    </style>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/backend/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    alert('Login Successful');
                    window.location.href = '/frontend/dashboard.html';
                } else {
                    alert(data.message || 'Invalid Email or Password');
                }
            } catch (err) {
                alert('Server Error. Please try again.');
                console.error(err);
            }
        });
    </script>

</body>
</html>
