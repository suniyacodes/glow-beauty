<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Beauty - Cart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f8f8f8;
padding:40px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
text-align:center;
color:#ff3f86;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#ff3f86;
color:white;
padding:15px;
font-size:18px;
}

table td{
padding:18px;
text-align:center;
border-bottom:1px solid #ddd;
font-size:17px;
}

tr:hover{
    background:#fff5f8;
    transition:.3s;
}

.total{
margin-top:25px;
text-align:right;
font-size:26px;
font-weight:bold;
color:#ff3f86;
}

.checkout button{
    background:linear-gradient(90deg,#ff3f86,#ff6aa8);
    border:none;
    color:#fff;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.checkout button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(255,63,134,.35);
}


.remove{
    background:#ff4d4d;
    color:white;
    padding:8px 18px;
    border-radius:25px;
    text-decoration:none;
    transition:.3s;
    border:none;
    cursor:pointer;
    font-size:15px;
}

.remove:hover{
    background:#d60000;
}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Your Shopping Cart</h1>

<table>

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>

<tbody id="cartBody">
    <tr><td colspan="3">Loading cart...</td></tr>
</tbody>

</table>

<div class="total" id="cartTotal">
    Total : ₹0
</div>

<div class="checkout">
<button>Proceed To Checkout</button>
</div>

</div>

<script>
    async function loadCart() {
        try {
            const res = await fetch('/backend/cart/view_cart', { credentials: 'include' });
            const data = await res.json();

            const tbody = document.getElementById('cartBody');
            const totalEl = document.getElementById('cartTotal');

            if (!data.success || data.cart.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">Your cart is empty.</td></tr>';
                totalEl.textContent = 'Total : ₹0';
                return;
            }

            let total = 0;
            tbody.innerHTML = '';

            data.cart.forEach(item => {
                total += parseFloat(item.price);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.product}</td>
                    <td>₹${item.price}</td>
                    <td>
                        <button class="remove" onclick="removeItem(${item.id})">Remove</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            totalEl.textContent = `Total : ₹${total}`;
        } catch (err) {
            console.error('Cart Error:', err);
        }
    }

    async function removeItem(id) {
        try {
            const res = await fetch(`/backend/cart/remove_cart?id=${id}`, { credentials: 'include' });
            const data = await res.json();
            if (data.success) {
                loadCart(); // Reload cart after removal
            }
        } catch (err) {
            console.error('Remove Error:', err);
        }
    }

    loadCart();
</script>

</body>
</html>
